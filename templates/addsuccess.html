<!DOCTYPE html>
<html>
<head>
    <title>Book Added Successfully</title>
    <style>
        body { font-family: Garamond, sans-serif; margin: 20px; text-align: center; }
        h2 {
            background-color: #597ad5;
            color: #FFF;
            padding: 16px;
            border: 1px solid black;
            margin: 0;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            border-radius: 5px;
        }
        .success-container {
            max-width: 500px;
            margin: 50px auto;
            border: 1px solid black;
            border-radius: 5px;
        }
        .book-details {
            text-align: left;
            margin: 20px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 4px;
        }
        .add-another {
            background-color: #DDD;
            color: black;
        }
        .view-library {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <h2>Book Added Successfully!</h2>
        
        <div class="book-details">
            <p><strong>ISBN:</strong> {{ book.isbn }}</p>
            <p><strong>Title:</strong> {{ book.name }}</p>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>Year:</strong> {{ book.yearPublished }}</p>
            <p><strong>Genre:</strong> {{ book.genre }}</p>
            <p><strong>Rating:</strong> {{ book.rating }}</p>
            <p><strong>Pages:</strong> {{ book.pages }}</p>
        </div>
        
        <a href="/addbook" class="button add-another">Add Another Book</a>
        <a href="/" class="button view-library">View Library</a>
    </div>
</body>
</html>
