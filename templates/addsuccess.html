<!DOCTYPE html>
<html>
<head>
    <title>Book Added Successfully</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; text-align: center; }
        .success-container {
            max-width: 500px;
            margin: 50px auto;
            padding: 20px;
            border: 1px solid #4CAF50;
            border-radius: 5px;
            background-color: #f8fff8;
        }
        .success-icon {
            color: #4CAF50;
            font-size: 48px;
            margin-bottom: 10px;
        }
        .book-details {
            text-align: left;
            margin: 20px 0;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            text-decoration: none;
            border-radius: 4px;
        }
        .add-another {
            background-color: #2196F3;
            color: white;
        }
        .view-library {
            background-color: #4CAF50;
            color: white;
        }
    </style>
</head>
<body>
    <div class="success-container">
        <div class="success-icon">✓</div>
        <h2>Book Added Successfully!</h2>
        
        <div class="book-details">
            <p><strong>ISBN:</strong> {{ book.isbn }}</p>
            <p><strong>Title:</strong> {{ book.name }}</p>
            <p><strong>Author:</strong> {{ book.author }}</p>
            <p><strong>Year:</strong> {{ book.yearPublished }}</p>
            <p><strong>Genre:</strong> {{ book.genre }}</p>
            <p><strong>Rating:</strong> {{ book.rating }}</p>
            <p><strong>Pages:</strong> {{ book.pages }}</p>
        </div>
        
        <a href="/addbook" class="button add-another">Add Another Book</a>
        <a href="/" class="button view-library">View Library</a>
    </div>
</body>
</html>
